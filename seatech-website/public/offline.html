<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#003366">
    <title>Offline | SEATECH</title>
    <style>
        :root { --navy: #003366; --ocean: #0077B6; --gold: #D4A017; --light: #F5F7FA; }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--light); color: var(--navy); }
        .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .card { max-width: 420px; width: 100%; background: #fff; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); padding: 2.5rem 2rem; text-align: center; }
        .logo { width: 88px; height: 88px; border-radius: 50%; background: linear-gradient(135deg, var(--navy), var(--ocean)); margin: 0 auto 1.25rem; display: flex; align-items: center; justify-content: center; }
        .logo svg { width: 48px; height: 48px; color: var(--gold); }
        h1 { font-size: 1.5rem; margin: 0 0 0.5rem; color: var(--navy); }
        p { color: #4b5563; margin: 0 0 1.5rem; line-height: 1.5; }
        .btn { display: inline-block; background: var(--navy); color: #fff; text-decoration: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; font-size: 0.95rem; }
        .btn:hover { background: #002244; }
        .links { margin-top: 1.5rem; font-size: 0.875rem; color: #6b7280; }
        .links a { color: var(--ocean); text-decoration: none; margin: 0 0.4rem; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="logo" aria-hidden="true">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4m0 4h.01"/>
                </svg>
            </div>
            <h1>You're offline</h1>
            <p>We couldn't reach the SEATECH site right now. Check your connection and try again.</p>
            <button class="btn" type="button" onclick="location.reload()">Try again</button>
            <div class="links">
                <a href="/">Home</a>·
                <a href="/about">About</a>·
                <a href="/courses">Courses</a>·
                <a href="/contact">Contact</a>
            </div>
        </div>
    </div>
</body>
</html>
